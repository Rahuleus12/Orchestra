# OpenTelemetry Collector configuration for Orchestra.
#
# Receives OTLP (gRPC :4317, HTTP :4318) from the Orchestra service and
# exports traces to Jaeger and metrics to the Prometheus exporter (:8889).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  # Traces -> Jaeger (OTLP gRPC on :4317 inside the compose network)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Metrics -> scraped by Prometheus on :8889
  prometheus:
    endpoint: 0.0.0.0:8889
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
