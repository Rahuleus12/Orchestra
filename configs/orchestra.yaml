# Orchestra — Multi-Agent AI Orchestration Engine
# Default Configuration
#
# Environment variables can be referenced using ${VAR} or ${VAR:-default} syntax.
# Provider-specific overrides can be set via ORCHESTRA_PROVIDER_<NAME>_<FIELD> env vars.
# See docs/PLAN.md for full configuration reference.

providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    default_model: gpt-4-turbo
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 150000
    retry:
      max_attempts: 3
      initial_backoff: 1s

  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    default_model: claude-sonnet-4-20250514
    rate_limit:
      requests_per_minute: 60

  ollama:
    base_url: http://localhost:11434
    default_model: llama3

  openrouter:
    api_key: ${OPENROUTER_API_KEY}
    base_url: https://openrouter.ai/api/v1
    default_model: openai/gpt-4o
    # Optional: app identification for OpenRouter rankings
    # app_name: orchestra
    # site_url: https://github.com/user/orchestra
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 500000
    retry:
      max_attempts: 3
      initial_backoff: 1s
    # Optional: model catalog caching (default: 5m)
    # model_cache_ttl: 5m
    # Optional: cost budget enforcement
    # cost_budget:
    #   max_cost_per_request: 0.10    # USD
    #   max_cost_per_session: 5.00     # USD
    # Optional: provider routing preferences
    # routing:
    #   provider_order: ["anthropic", "openai"]
    #   fallback: true
    #   data_collection: "deny"

logging:
  level: info
  format: json

observability:
  tracing:
    enabled: true
    endpoint: http://localhost:4318
  metrics:
    enabled: true
    endpoint: http://localhost:9090/metrics
