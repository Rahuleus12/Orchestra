# Prometheus configuration for Orchestra.
#
# Scrapes the OpenTelemetry Collector's Prometheus exporter (:8889), which
# exposes metrics received from the Orchestra service via OTLP.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alerting and recording rules.
rule_files:
  - /etc/prometheus/alerting-rules.yaml

# Alertmanager (optional; uncomment if you run an Alertmanager instance).
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

scrape_configs:
  # OpenTelemetry Collector Prometheus exporter (orchestra metrics via OTLP).
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  # Orchestra HTTP /metrics endpoint (if exposed directly).
  - job_name: orchestra
    static_configs:
      - targets:
          - orchestra:8080
    metrics_path: /metrics
